{{/*
  Secret เก็บค่า sensitive — inject เป็น env vars เข้า pod
  ค่าจริงตั้งใน values-generated.json หรือ override ตอน helm install
*/}}
{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: kafka-workers-secrets
  labels:
    {{- include "kafka-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
